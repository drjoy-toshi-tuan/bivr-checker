<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIVR Checker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>
<div class="bg-grid"></div>

<!-- ── Header ─────────────────────────────────────────────────────────────── -->
<header class="header">
  <div class="header-inner">
    <div class="brand">
      <span class="brand-icon"><i class="fa-solid fa-diagram-project"></i></span>
      <div class="brand-text">
        <h1 class="brand-title" data-i18n="app_title">BIVR チェッカー</h1>
        <p class="brand-sub" data-i18n="app_subtitle">Brekeke IVR ファイル検証ツール</p>
      </div>
    </div>
    <button class="lang-btn" id="langBtn">
      <i class="fa-solid fa-language"></i>
      <span>Tiếng Việt</span>
    </button>
  </div>
</header>

<main class="main">

  <!-- ── Hero ──────────────────────────────────────────────────────────────── -->
  <section class="hero">
    <h2 class="hero-title" data-i18n="hero_title">AI電話シナリオフローを安全に検証</h2>
    <div class="hero-badges">
      <span class="hero-badge"><i class="fa-solid fa-lock"></i> <span data-i18n="hero_badge_local">ローカル処理</span></span>
      <span class="hero-badge"><i class="fa-solid fa-bolt"></i> <span data-i18n="hero_badge_fast">高速</span></span>
      <span class="hero-badge"><i class="fa-solid fa-language"></i> <span data-i18n="hero_badge_bilingual">日本語 / Tiếng Việt</span></span>
    </div>
  </section>

  <!-- ── Step 1: Mode + Upload + Checks (all in one card) ──────────────────── -->
  <section class="card">
    <div class="step-header">
      <span class="step-badge">01</span>
      <div class="step-titles">
        <h2 class="step-title"><i class="fa-solid fa-list-check step-ico"></i> <span data-i18n="step1_title">チェックモードの選択</span></h2>
      </div>
      <button class="collapse-btn" data-target="settingBody" aria-expanded="true" title="">
        <i class="fa-solid fa-chevron-up"></i>
      </button>
    </div>

    <div class="card-body" id="settingBody">
    <!-- Mode cards -->
    <div class="mode-grid" id="modeGrid">
      <label class="mode-card mode-deploy">
        <input type="radio" name="mode" value="deploy">
        <span class="mode-body">
          <span class="mode-ico"><i class="fa-solid fa-rocket"></i></span>
          <span class="mode-title" data-i18n="mode_deploy_title">本番適用前の全体検証</span>
          <span class="mode-desc" data-i18n="mode_deploy_desc"></span>
        </span>
      </label>
      <label class="mode-card mode-flow">
        <input type="radio" name="mode" value="flow">
        <span class="mode-body">
          <span class="mode-ico"><i class="fa-solid fa-diagram-project"></i></span>
          <span class="mode-title" data-i18n="mode_flow_title">フローのみ検証</span>
          <span class="mode-desc" data-i18n="mode_flow_desc"></span>
        </span>
      </label>
      <label class="mode-card mode-property">
        <input type="radio" name="mode" value="property">
        <span class="mode-body">
          <span class="mode-ico"><i class="fa-solid fa-sliders"></i></span>
          <span class="mode-title" data-i18n="mode_property_title">IVRプロパティのみ検証</span>
          <span class="mode-desc" data-i18n="mode_property_desc"></span>
        </span>
      </label>
      <label class="mode-card mode-compare">
        <input type="radio" name="mode" value="compare">
        <span class="mode-body">
          <span class="mode-ico"><i class="fa-solid fa-code-compare"></i></span>
          <span class="mode-title" data-i18n="mode_compare_title">2環境間のフロー比較</span>
          <span class="mode-desc" data-i18n="mode_compare_desc"></span>
        </span>
      </label>
    </div>

    <!-- Detail area: shown only after mode is selected -->
    <div id="modeDetail" hidden>
      <div class="card-divider"></div>

      <!-- Check options -->
      <div class="config-group">
        <div class="checks-header">
          <label class="group-label"><i class="fa-solid fa-list-check"></i> <span data-i18n="checks_label">チェック項目</span></label>
          <button class="check-all-btn" id="checkAllBtn" data-i18n="check_all">すべて選択</button>
        </div>
        <div class="checks-grid" id="checksGrid">
          <!-- Column 1: Flow -->
          <div class="check-col">
            <div class="check-cat" data-cat="flow">
              <div class="check-cat-head check-cat-flow">
                <span class="cat-head-label"><i class="fa-solid fa-diagram-project"></i> <span data-i18n="scope_flow">フロー</span></span>
                <button type="button" class="cat-toggle" data-cat-toggle="flow" data-i18n-title="cat_select_all" title="">
                  <i class="fa-solid fa-list-check"></i>
                </button>
              </div>
              <div class="check-cat-body">
                <label class="check-label" data-check="phone" data-scope="flow">
                  <input type="checkbox" class="check-input" value="phone" checked>
                  <span class="check-custom"></span>
                  <span class="opt-text">
                    <i class="fa-solid fa-phone-volume opt-ico"></i>
                    <span class="check-label-text" data-i18n="check_phone">「転送」モジュール検証</span>
                  </span>
                </label>
                <label class="check-label" data-check="jump" data-scope="flow">
                  <input type="checkbox" class="check-input" value="jump" checked>
                  <span class="check-custom"></span>
                  <span class="opt-text">
                    <i class="fa-solid fa-arrow-right-arrow-left opt-ico"></i>
                    <span class="check-label-text" data-i18n="check_jump">「Jump To Flow」モジュール検証</span>
                  </span>
                </label>
                <label class="check-label" data-check="ctxrouter" data-scope="flow">
                  <input type="checkbox" class="check-input" value="ctxrouter" checked>
                  <span class="check-custom"></span>
                  <span class="opt-text">
                    <i class="fa-solid fa-code-branch opt-ico"></i>
                    <span class="check-label-text" data-i18n="check_ctxrouter">「Context Match Router」モジュール検証</span>
                  </span>
                </label>
                <label class="check-label" data-check="openai" data-scope="flow">
                  <input type="checkbox" class="check-input" value="openai" checked>
                  <span class="check-custom"></span>
                  <span class="opt-text">
                    <i class="fa-solid fa-robot opt-ico"></i>
                    <span class="check-label-text" data-i18n="check_openai">「OpenAI」モジュール検証</span>
                  </span>
                </label>
                <label class="check-label" data-check="reconfirm" data-scope="flow">
                  <input type="checkbox" class="check-input" value="reconfirm" checked>
                  <span class="check-custom"></span>
                  <span class="opt-text">
                    <i class="fa-solid fa-rotate opt-ico"></i>
                    <span class="check-label-text" data-i18n="check_reconfirm">「復唱」モジュール検証</span>
                  </span>
                </label>
                <label class="check-label" data-check="flag" data-scope="flow">
                  <input type="checkbox" class="check-input" value="flag" checked>
                  <span class="check-custom"></span>
                  <span class="opt-text">
                    <i class="fa-solid fa-flag-checkered opt-ico"></i>
                    <span class="check-label-text" data-i18n="check_flag">「完了フラグ保存」モジュール検証</span>
                  </span>
                </label>
                <label class="check-label" data-check="regex" data-scope="flow">
                  <input type="checkbox" class="check-input" value="regex" checked>
                  <span class="check-custom"></span>
                  <span class="opt-text">
                    <i class="fa-solid fa-asterisk opt-ico"></i>
                    <span class="check-label-text" data-i18n="check_regex">全体の正規表現スペース検証</span>
                  </span>
                </label>
                <label class="check-label" data-check="submod" data-scope="flow">
                  <input type="checkbox" class="check-input" value="submod" checked>
                  <span class="check-custom"></span>
                  <span class="opt-text">
                    <i class="fa-solid fa-sitemap opt-ico"></i>
                    <span class="check-label-text" data-i18n="check_submod">全体のサブフロー設定検証</span>
                  </span>
                </label>
                <label class="check-label" data-check="script" data-scope="flow">
                  <input type="checkbox" class="check-input" value="script" checked>
                  <span class="check-custom"></span>
                  <span class="opt-text">
                    <i class="fa-solid fa-code opt-ico"></i>
                    <span class="check-label-text" data-i18n="check_script">「Script」モジュールの構文検証</span>
                  </span>
                </label>
                <label class="check-label" data-check="entity" data-scope="flow">
                  <input type="checkbox" class="check-input" value="entity" checked>
                  <span class="check-custom"></span>
                  <span class="opt-text">
                    <i class="fa-solid fa-tags opt-ico"></i>
                    <span class="check-label-text" data-i18n="check_entity">「Entity Classifier」モジュール検証</span>
                  </span>
                </label>
              </div>
            </div>
          </div>
          <!-- Column 2: Property + Mix -->
          <div class="check-col">
            <div class="check-cat" data-cat="property">
              <div class="check-cat-head check-cat-property">
                <span class="cat-head-label"><i class="fa-solid fa-sliders"></i> <span data-i18n="scope_property">プロパティ</span></span>
                <button type="button" class="cat-toggle" data-cat-toggle="property" data-i18n-title="cat_select_all" title="">
                  <i class="fa-solid fa-list-check"></i>
                </button>
              </div>
              <div class="check-cat-body">
                <label class="check-label" data-check="api" data-scope="property">
                  <input type="checkbox" class="check-input" value="api" checked>
                  <span class="check-custom"></span>
                  <span class="opt-text">
                    <i class="fa-solid fa-link opt-ico"></i>
                    <span class="check-label-text" data-i18n="check_api">APIリンク検証</span>
                  </span>
                </label>
              </div>
            </div>
            <div class="check-cat" data-cat="mix">
              <div class="check-cat-head check-cat-mix">
                <span class="cat-head-label"><i class="fa-solid fa-layer-group"></i> <span data-i18n="scope_mix">プロパティ＋フロー</span></span>
                <button type="button" class="cat-toggle" data-cat-toggle="mix" data-i18n-title="cat_select_all" title="">
                  <i class="fa-solid fa-list-check"></i>
                </button>
              </div>
              <div class="check-cat-body">
                <label class="check-label" data-check="prompt" data-scope="mix">
                  <input type="checkbox" class="check-input" value="prompt" checked>
                  <span class="check-custom"></span>
                  <span class="opt-text">
                    <i class="fa-solid fa-comment-dots opt-ico"></i>
                    <span class="check-label-text" data-i18n="check_prompt">全体のアナウンス検証</span>
                  </span>
                </label>
                <label class="check-label" data-check="diff" data-scope="mix">
                  <input type="checkbox" class="check-input" value="diff" checked>
                  <span class="check-custom"></span>
                  <span class="opt-text">
                    <i class="fa-solid fa-code-compare opt-ico"></i>
                    <span class="check-label-text" data-i18n="check_diff">差分検証</span>
                  </span>
                </label>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="card-divider"></div>

      <!-- Upload zone(s) -->
      <div class="section-sub-label"><i class="fa-solid fa-cloud-arrow-up"></i> <span data-i18n="step2_title">ファイルのアップロード</span></div>

      <div class="upload-grid single-up" id="singleUpload">
        <div class="upload-zone" id="zipZone">
          <span class="upload-icon-box req"><i class="fa-solid fa-file-zipper" id="zipIcon"></i></span>
          <span class="upload-label">
            <span class="upload-label-text" id="zipLabelText" data-i18n="up_deploy_label">エクスポートフローファイル（ZIP）</span>
            <span class="req-stamp" data-i18n="required_stamp">必須</span>
          </span>
          <span class="upload-hint" id="zipHint" data-i18n="up_deploy_hint"></span>
          <span class="upload-filename" id="zipName"></span>
          <button class="file-clear" data-zone="zipZone" data-input="zipInput" data-key="zipFile"><i class="fa-solid fa-xmark"></i></button>
          <input type="file" id="zipInput" accept=".zip" hidden>
          <div class="detected" id="zipDetected" hidden></div>
        </div>
      </div>

      <div class="upload-grid compare-up" id="compareUpload" hidden>
        <div class="upload-zone" id="demoZone">
          <span class="upload-icon-box"><i class="fa-solid fa-flask"></i></span>
          <span class="upload-label">
            <span class="upload-label-text" data-i18n="zip_demo_label">デモ環境（ZIP）</span>
            <span class="req-stamp" data-i18n="required_stamp">必須</span>
          </span>
          <span class="upload-hint" data-i18n="zip_hint_set"></span>
          <span class="upload-filename" id="demoName"></span>
          <button class="file-clear" data-zone="demoZone" data-input="demoInput" data-key="demoZipFile"><i class="fa-solid fa-xmark"></i></button>
          <input type="file" id="demoInput" accept=".zip" hidden>
          <div class="detected" id="demoDetected" hidden></div>
        </div>
        <div class="upload-zone" id="masterZone">
          <span class="upload-icon-box"><i class="fa-solid fa-server"></i></span>
          <span class="upload-label">
            <span class="upload-label-text" data-i18n="zip_master_label">本番環境（ZIP）</span>
            <span class="req-stamp" data-i18n="required_stamp">必須</span>
          </span>
          <span class="upload-hint" data-i18n="zip_hint_set"></span>
          <span class="upload-filename" id="masterName"></span>
          <button class="file-clear" data-zone="masterZone" data-input="masterInput" data-key="masterZipFile"><i class="fa-solid fa-xmark"></i></button>
          <input type="file" id="masterInput" accept=".zip" hidden>
          <div class="detected" id="masterDetected" hidden></div>
        </div>
      </div>

      <div class="run-row">
        <div class="error-msg" id="errorMsg" style="display:none"></div>
        <button class="btn-primary btn-run-full" id="runBtn">
          <i class="fa-solid fa-play btn-ico" id="runIcon"></i>
          <span data-i18n="run_btn">チェック実行</span>
        </button>
      </div>
    </div>
    </div>
  </section>

  <!-- ── Step 2: Results ───────────────────────────────────────────────────── -->
  <section class="card" id="step3" hidden>
    <div class="step-header">
      <span class="step-badge">02</span>
      <div class="step-titles">
        <h2 class="step-title"><i class="fa-solid fa-clipboard-check step-ico"></i> <span data-i18n="step4_title">結果</span></h2>
      </div>
      <button class="collapse-btn" data-target="resultBody" aria-expanded="true" title="">
        <i class="fa-solid fa-chevron-up"></i>
      </button>
    </div>

    <div class="card-body" id="resultBody">
    <div class="result-summary" id="resultSummary"></div>

    <div class="result-actions download-row">
      <div class="filename-box">
        <input type="text" id="downloadName" class="filename-input" spellcheck="false" autocomplete="off">
        <span class="filename-ext">.md</span>
      </div>
      <button class="btn-download" id="downloadBtn">
        <i class="fa-solid fa-download"></i>
        <span data-i18n="download_btn">レポートをダウンロード</span>
      </button>
    </div>

    <div class="preview-head">
      <i class="fa-solid fa-file-lines"></i>
      <span data-i18n="preview_label">レポートプレビュー</span>
    </div>
    <div class="md-preview markdown-body" id="resultPreview"></div>
    </div>
  </section>

</main>

<footer class="footer">
  <span><i class="fa-solid fa-shield-halved"></i> <span data-i18n="footer_text">すべての処理はブラウザ内で完結します — ファイルはサーバーに送信されません</span></span>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="js/i18n.js"></script>
<script src="js/checker.js"></script>
<script src="js/reporter.js"></script>
<script src="js/app.js"></script>
</body>
</html>
