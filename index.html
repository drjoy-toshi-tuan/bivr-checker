<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIVR Checker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>

<!-- ── Header ─────────────────────────────────────────────────────────────── -->
<header class="glass header">
  <div class="header-inner">
    <div class="brand">
      <span class="brand-icon">⬡</span>
      <div>
        <h1 class="brand-title" data-i18n="app_title">BIVR チェッカー</h1>
        <p class="brand-sub" data-i18n="app_subtitle">Brekeke IVR ファイル検証ツール</p>
      </div>
    </div>
    <button class="lang-btn" id="langBtn">Tiếng Việt</button>
  </div>
</header>

<main class="main">

  <!-- ── Step 1: Upload ────────────────────────────────────────────────────── -->
  <section class="card">
    <div class="step-header">
      <span class="step-badge">01</span>
      <h2 class="step-title" data-i18n="step1_title">ファイルのアップロード</h2>
    </div>

    <div class="upload-grid">
      <!-- BIVR (required) -->
      <div class="upload-zone" id="bivrZone">
        <span class="upload-icon">📄</span>
        <span class="upload-label" data-i18n="bivr_label">BIVR ファイル（必須）</span>
        <span class="upload-hint" data-i18n="bivr_hint">.bivr をドラッグ＆ドロップ、またはクリックして選択</span>
        <span class="upload-filename" id="bivrName"></span>
        <button class="file-clear" data-zone="bivrZone" data-input="bivrInput" data-key="bivrFile">×</button>
        <input type="file" id="bivrInput" accept=".bivr" hidden>
      </div>

      <!-- IVR Properties (optional) -->
      <div class="upload-zone" id="propsZone">
        <span class="upload-icon">⚙️</span>
        <span class="upload-label" data-i18n="props_label">IVR Properties</span>
        <span class="upload-hint" data-i18n="props_hint">.properties ファイルをドラッグ＆ドロップ、またはクリックして選択</span>
        <span class="upload-filename" id="propsName"></span>
        <button class="file-clear" data-zone="propsZone" data-input="propsInput" data-key="propsFile">×</button>
        <input type="file" id="propsInput" accept=".properties,.txt,.ini" hidden>
      </div>

      <!-- Compare BIVR (optional) -->
      <div class="upload-zone" id="compareZone">
        <span class="upload-icon">🔄</span>
        <span class="upload-label" data-i18n="compare_label">BIVR（比較用）</span>
        <span class="upload-hint" data-i18n="compare_hint">現行版の .bivr ファイルをドラッグ＆ドロップ、またはクリックして選択</span>
        <span class="upload-filename" id="compareName"></span>
        <button class="file-clear" data-zone="compareZone" data-input="compareInput" data-key="compareFile">×</button>
        <input type="file" id="compareInput" accept=".bivr" hidden>
      </div>
    </div>
  </section>

  <!-- ── Step 2: Config ────────────────────────────────────────────────────── -->
  <section class="card">
    <div class="step-header">
      <span class="step-badge">02</span>
      <h2 class="step-title" data-i18n="step2_title">設定</h2>
    </div>

    <div class="config-grid">
      <!-- Environment -->
      <div class="config-group">
        <label data-i18n="env_label">環境</label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="env" value="master" checked>
            <span class="radio-custom"></span>
            <span class="check-label-text" data-i18n="env_master">本番 (Master)</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="env" value="demo">
            <span class="radio-custom"></span>
            <span class="check-label-text" data-i18n="env_demo">デモ (Demo)</span>
          </label>
        </div>
      </div>

      <!-- Checks -->
      <div class="config-group">
        <div class="checks-header">
          <label data-i18n="checks_label">チェック項目</label>
          <button class="check-all-btn" id="checkAllBtn" data-i18n="check_all">すべて選択</button>
        </div>
        <div class="checks-grid">
          <label class="check-label">
            <input type="checkbox" class="check-input" value="api" checked>
            <span class="check-custom"></span>
            <span class="check-label-text" data-i18n="check_api">API URL チェック</span>
          </label>
          <label class="check-label">
            <input type="checkbox" class="check-input" value="phone" checked>
            <span class="check-custom"></span>
            <span class="check-label-text" data-i18n="check_phone">電話番号チェック</span>
          </label>
          <label class="check-label">
            <input type="checkbox" class="check-input" value="jump" checked>
            <span class="check-custom"></span>
            <span class="check-label-text" data-i18n="check_jump">Jump to Flow チェック</span>
          </label>
          <label class="check-label disabled" id="diffCheckLabel">
            <input type="checkbox" class="check-input" value="diff" id="checkDiff" disabled>
            <span class="check-custom"></span>
            <span class="check-label-text" data-i18n="check_diff">差分チェック（比較ファイル必須）</span>
          </label>
        </div>
      </div>
    </div>

    <div class="run-row">
      <div class="error-msg" id="errorMsg" style="display:none"></div>
      <button class="btn-primary" id="runBtn">
        <span data-i18n="run_btn">チェック実行</span>
      </button>
    </div>
  </section>

  <!-- ── Step 3: Results ───────────────────────────────────────────────────── -->
  <section class="card" id="step3" hidden>
    <div class="step-header">
      <span class="step-badge">03</span>
      <h2 class="step-title" data-i18n="step3_title">結果</h2>
    </div>

    <div class="result-summary" id="resultSummary"></div>

    <div class="result-actions">
      <button class="btn-download" id="downloadBtn">
        <span data-i18n="download_btn">⬇ Markdown レポートをダウンロード</span>
      </button>
    </div>

    <pre class="md-preview" id="resultPreview"></pre>
  </section>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="js/i18n.js"></script>
<script src="js/checker.js"></script>
<script src="js/reporter.js"></script>
<script src="js/app.js"></script>
</body>
</html>
